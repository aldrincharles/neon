<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dashboard | CRMApp</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light font-display text-slate-900">
    <div class="min-h-screen flex flex-col">

        {# Shared navigation bar - active_page drives the highlighted link #}
        {% include 'navbar.html' with active_page='dashboard' %}

        <main class="flex-1 w-full">
            <div class="max-w-[1440px] mx-auto px-8 py-16 flex flex-col items-center justify-center text-center">
                <div class="size-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-6">
                    <span class="material-symbols-outlined text-primary text-4xl">rocket_launch</span>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Welcome to CRMApp</h2>
                <p class="text-slate-500 text-lg max-w-md">
                    Your all-in-one recruitment CRM. Use the navigation above to manage
                    Jobs, People, and Organizations.
                </p>
            </div>
        </main>

    </div>
</body>

</html>
