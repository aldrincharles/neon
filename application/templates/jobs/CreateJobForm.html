<div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
    <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-xl font-bold text-slate-900">Create New Job</h2>
        <!-- Close (X) button - id targeted by jQuery in Jobs.html -->
        <button id="btn-modal-close" class="text-slate-400 hover:text-slate-600" type="button">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    <div class="p-6 overflow-y-auto">
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Job Title</label>
                <input
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                    placeholder="e.g. Senior Frontend Engineer" type="text" />
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description</label>
                <div class="border border-slate-300 rounded-lg overflow-hidden">
                    <div class="bg-slate-50 border-b border-slate-200 px-3 py-2 flex gap-2">
                        <button class="p-1 hover:bg-white rounded text-slate-600" type="button"><span
                                class="material-symbols-outlined text-lg">format_bold</span></button>
                        <button class="p-1 hover:bg-white rounded text-slate-600" type="button"><span
                                class="material-symbols-outlined text-lg">format_italic</span></button>
                        <button class="p-1 hover:bg-white rounded text-slate-600" type="button"><span
                                class="material-symbols-outlined text-lg">format_list_bulleted</span></button>
                        <button class="p-1 hover:bg-white rounded text-slate-600" type="button"><span
                                class="material-symbols-outlined text-lg">link</span></button>
                    </div>
                    <textarea class="w-full px-4 py-3 border-none focus:ring-0 outline-none resize-none"
                        placeholder="Describe the role responsibilities and requirements..." rows="4"></textarea>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Location</label>
                    <select
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none bg-white">
                        <option>Remote</option>
                        <option>On-site</option>
                        <option>Hybrid</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Head Count</label>
                    <input
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        min="1" placeholder="1" type="number" />
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Compensation Range</label>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
                        <input
                            class="w-full pl-7 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="Min" type="number" />
                    </div>
                    <span class="text-slate-400 font-medium">to</span>
                    <div class="relative flex-1">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
                        <input
                            class="w-full pl-7 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="Max" type="number" />
                    </div>
                    <select
                        class="w-24 px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none bg-white text-sm">
                        <option>USD</option>
                        <option>EUR</option>
                        <option>GBP</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex items-center justify-end gap-3 rounded-b-xl">
        <!-- Cancel button - id targeted by jQuery in Jobs.html -->
        <button id="btn-modal-cancel" type="button"
            class="px-5 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
        <button
            class="px-5 py-2 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-primary/90 transition-colors shadow-sm shadow-primary/20">Create
            Job</button>
    </div>
</div>
